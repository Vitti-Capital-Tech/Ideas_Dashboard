name: Daily Content Generator

on:
  schedule:
    - cron: '0 9 * * 1-5' # Runs Mon-Fri at 09:00 AM UTC (Weekdays only)
  workflow_dispatch: # Allows triggering manually from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Ideas Pack Generator
        env:
          # Set ANTHROPIC_API_KEY or CLAUDE_API_KEY in repo secrets (either works)  
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          RAINDROP_TOKEN: ${{ secrets.RAINDROP_TOKEN }}
          DISABLE_GOOGLE_DOC: "1"
        run: python -u generate_raindrop_posts.py

      - name: Commit and Push Logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          mkdir -p web/logs
          touch web/used_bookmarks.txt
          git add web/logs/ web/used_bookmarks.txt
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: automated content generation logs"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
