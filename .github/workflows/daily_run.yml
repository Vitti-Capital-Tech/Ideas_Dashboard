name: Daily Raindrop Ideas

# Schedule: 9 AM Sydney = 23:00 UTC previous day
on:
  schedule:
    - cron: '0 22 * * *'
    # - cron: '*/5 * * * *'   # Every 5 minutes (UTC)
  workflow_dispatch:

jobs:
  run_python:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Ensure last_run.txt exists
      - name: Create last_run.txt if missing
        run: |
          if [ ! -f last_run.txt ]; then
            echo "0" > last_run.txt
          fi

      # Step 5: Run the main script
      - name: Run scripts
        run: |
          python t.py
          python s.py

